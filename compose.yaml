services:
  db:
    image: postgres:17
    container_name: cosma-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build:
      context: .
      dockerfile: src/CosmaAPI/Dockerfile
    container_name: cosma-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SSL Mode=Disable;GSS Encryption Mode=Disable

      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpirationInMinutes: ${JWT_EXPIRATION_MINUTES}

      DevelopmentSeeding__Enabled: ${DEV_SEED_ENABLED}
      DevelopmentSeeding__ExpensesCount: ${DEV_SEED_EXPENSE_COUNT}
      DevelopmentSeeding__ResetExisting: ${DEV_SEED_RESET_EXISTING}
    ports:
      - "8080:8080"

volumes:
  postgres_data: